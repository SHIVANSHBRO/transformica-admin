# Builds the Transformica admin panel and deploys it to GitHub Pages on every
# push to main. The Supabase URL + anon key are injected at build time from repo
# Variables (Settings → Secrets and variables → Actions → Variables):
#   VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY
# (The anon key is public-safe — data is protected by admin login + RLS.)
name: Deploy admin to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # lets you re-run the deploy manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; a newer push supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
